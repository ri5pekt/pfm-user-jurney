# Host nginx config for uj.pfm-qa.com
# Deploy path on VPS: /etc/nginx/sites-available/uj-pfm-qa
# Enable with: ln -s /etc/nginx/sites-available/uj-pfm-qa /etc/nginx/sites-enabled/
# Test + reload: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name uj.pfm-qa.com;

    # ── Collector — POST /p ───────────────────────────────────────────────────
    location = /p {
        proxy_pass         http://127.0.0.1:3101;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Fast timeout — fire-and-forget endpoint
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # ── Admin API — /api/* ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3102/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ── Frontend — /admin/ (static Vue build) ────────────────────────────────
    # Built locally → SCP to /var/www/pfm-uj/frontend/ → chmod -R 755
    location /admin/ {
        alias   /var/www/pfm-uj/frontend/;
        try_files $uri $uri/ /admin/index.html;
        index   index.html;

        location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Test / root ───────────────────────────────────────────────────────────
    # Serves /var/www/pfm-uj/index.html — used to verify DNS + nginx
    # Remove or replace once the app is live
    location / {
        root  /var/www/pfm-uj;
        index index.html;
    }

    # ── SSL placeholder ───────────────────────────────────────────────────────
    # After confirming HTTP works, run:
    # certbot --nginx -d uj.pfm-qa.com --non-interactive --agree-tos \
    #   --email your@email.com --redirect
    # certbot will auto-modify this file and add the 443 block.
}
