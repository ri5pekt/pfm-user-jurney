# Local dev — accessible at http://localhost:8080
server {
    listen 80;
    server_name localhost;

    # Collector — POST /p
    location = /p {
        proxy_pass         http://collector:3001/p;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Admin API — /api/*
    location /api/ {
        proxy_pass         http://admin-api:3002/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend — /admin/ (placeholder until Phase 2 Vite dev server is added)
    location /admin/ {
        return 200 '{"status":"frontend coming in Phase 2"}';
        add_header Content-Type application/json;
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
