# Production — uj.pfm-qa.com
# SSL handled separately via certbot (adds listen 443 block automatically)
server {
    listen 80;
    server_name uj.pfm-qa.com;

    # Redirect HTTP → HTTPS once SSL is enabled
    # Uncomment after running certbot:
    # return 301 https://$host$request_uri;

    # Collector — POST /p
    location = /p {
        proxy_pass         http://collector:3001/p;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Rate limiting (define zone in nginx.conf http block if needed)
        # limit_req zone=collector burst=50 nodelay;
    }

    # Admin API — /api/*
    location /api/ {
        proxy_pass         http://admin-api:3002/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend — /admin/ (static Vue build)
    location /admin/ {
        alias   /var/www/frontend/;
        try_files $uri $uri/ /admin/index.html;
        index   index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
