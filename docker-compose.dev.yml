services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pfm_journeys}
      POSTGRES_USER: ${POSTGRES_USER:-pfm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/migrate.sql:/docker-entrypoint-initdb.d/migrate.sql:ro
    networks:
      - uj_dev_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - uj_dev_net

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile.dev
    volumes:
      - ./collector/src:/app/src:delegated
    env_file: .env
    ports:
      - "13001:3001"
    depends_on:
      - redis
    networks:
      - uj_dev_net

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile.dev
    volumes:
      - ./worker/src:/app/src:delegated
    env_file: .env
    depends_on:
      - redis
      - postgres
    networks:
      - uj_dev_net

  admin-api:
    build:
      context: ./admin-api
      dockerfile: Dockerfile.dev
    volumes:
      - ./admin-api/src:/app/src:delegated
    env_file: .env
    ports:
      - "13002:3002"
    depends_on:
      - postgres
    networks:
      - uj_dev_net

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - collector
      - admin-api
    networks:
      - uj_dev_net

volumes:
  postgres_dev_data:

networks:
  uj_dev_net:
    driver: bridge
